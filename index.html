<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodBridge - Send Food Across Nigeria</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background: #f5f5f5; color: #333; }
header { background: #E67E22; color: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; }
header img { width: 50px; height: 50px; border-radius: 8px; }
header h1 { font-size: 24px; }
.hero { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), #E67E22; color: white; text-align: center; padding: 60px 20px; }
.hero h2 { font-size: 32px; margin-bottom: 15px; }
.hero p { font-size: 18px; margin-bottom: 25px; }
.btn { background: #E67E22; color: white; padding: 12px 30px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; text-decoration: none; display: inline-block; }
.btn:hover { background: #d66d0f; }
.btn-secondary { background: #7f8c8d; margin-left: 10px; }
.btn-secondary:hover { background: #6c7a7d; }
.btn-small { padding: 8px 15px; font-size: 14px; background: #27AE60; }
.btn-small:hover { background: #229954; }
.container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
.section { background: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.section h3 { color: #E67E22; margin-bottom: 20px; font-size: 24px; }
.branches { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
.branch-card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; background: #fafafa; }
.branch-card h4 { color: #27AE60; margin-bottom: 10px; }
.fee-box { background: #FFF8E1; padding: 15px; border-left: 4px solid #E67E22; margin: 20px 0; }
.food-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 15px; }
.food-item { background: #E8F5E9; padding: 10px; border-radius: 5px; text-align: center; }
input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 15px; }
.result-box { background: #fff3cd; padding: 15px; border-left: 4px solid #ffc107; border-radius: 5px; margin-top: 15px; display: none; }
.code { font-size: 24px; font-weight: bold; letter-spacing: 2px; color: #27AE60; margin-bottom: 10px; }
.button-group { display: flex; gap: 10px; flex-wrap: wrap; }
.code-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
footer { background: #2C3E50; color: white; text-align: center; padding: 20px; margin-top: 50px; }
@media (max-width: 768px) { 
  .hero h2 { font-size: 24px; } 
  .button-group { flex-direction: column; } 
  .code-row { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>

<header>
<img src="IMG-20260507-WA0002.jpg" alt="FoodBridge Logo">
<h1>FoodBridge</h1>
</header>

<div class="hero">
<h2>Send Food to Anyone, Anywhere in Nigeria</h2>
<p>Deposit food at any branch. Your family collects it at another branch. Simple, safe, reliable.</p>
<a href="#deposit" class="btn">Get Started</a
