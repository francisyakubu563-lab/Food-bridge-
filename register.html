<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - FoodBridge</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background:#FFF8F3; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
    .box { background:white; padding:30px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); width:100%; max-width:350px; }
    input { width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; }
    button { width:100%; padding:12px; background:#FF6B35; color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer; }
    a { color:#FF6B35; text-decoration:none; }
  </style>
</head>
<body>
  <div class="box">
    <h2 style="text-align:center;margin-top:0;">Create Account</h2>
    <form id="signupForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password 6+ characters" required>
      <button type="submit">Sign Up</button>
    </form>
    <p style="text-align:center;margin-top:15px;">Already have an account? <a href="index.html">Home</a></p>
  </div>

  <script type="module">
    import { supabase } from './lib/supabaseClient.js'

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value

      const { data, error } = await supabase.auth.signUp({ email, password })
      if (error) alert('Error: ' + error.message)
      else alert('Account created! Check your email to confirm.')
    })
  </script>
</body>
</html>
